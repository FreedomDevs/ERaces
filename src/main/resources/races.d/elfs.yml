elf:
  gui_config:
    name: "§aЭльф"
    lore: "§aЛесной народ, в гармонии с природой.\n\n§eБонусы:\n§7»  Скорость II в лесах и равнинах.\n§7»  Удвоенный урон и скорость стрел из лука.\n§7»  Метаболизм: расход голода на 25% меньше.\n\n§cМинусы:\n§7»  Только 15 HP (7.5 сердечек).\n§7»  Штраф за ношение брони выше железной — замедление I.\n§7»  Не может есть мясо (вегетарианец).\n§7»  Урон ближнего боя x0.5.\n\n§7Для выбора нажмите: §f[ПКМ]"
    icon: "OAK_SAPLING"
  max_hp: 20
  mana_regeneration_modifiers:
    - multiplier: 1.1
  weapon_proficiency:
    sword_damage_multiplier: 0.75
    axe_damage_multiplier: 0.75


    #Скорость атаки +15%(в принципе нету)
    #Эффект замерзания в зимних биомах


dark_elf:
  gui_config:
    name: "Тёмный эльф"
    lore: ""
    icon: "MACE"
  max_hp: 12
  effects_with:
    in_biome:
      - biomes:
          - deep_dark
          - pale_garden
        effects:
          speed: 2
          regeneration: 1
  exclude_from_random: true

  #Минусы:
  #Получает урон от зелья исцеления и регенарации
  #
  #Способности:
  #
  #Арсенал
  #Кд 5 минут
  #При использование выдаёт 16 штук одних из стрел:
  #Отравление 1
  #Тошнота 1
  #Замедление 1
  #Слепота 1

